<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ANPR Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-icon">🚗</div>
            <h1>ANPR<span>Gate</span></h1>
        </div>
        <ul class="nav-links">
            <li><a href="{{ url_for('dashboard') }}" class="{% if request.endpoint == 'dashboard' %}active{% endif %}">
                <span class="nav-icon">📊</span> Dashboard
            </a></li>
            <li><a href="{{ url_for('events') }}" class="{% if request.endpoint == 'events' %}active{% endif %}">
                <span class="nav-icon">📋</span> Event Log
            </a></li>
            <li><a href="{{ url_for('vehicles') }}" class="{% if request.endpoint == 'vehicles' %}active{% endif %}">
                <span class="nav-icon">🚙</span> Vehicles
            </a></li>
        </ul>
        <div class="sidebar-footer">
            <span class="status-dot"></span> System Online
        </div>
    </nav>

    <main class="content">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash flash-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
